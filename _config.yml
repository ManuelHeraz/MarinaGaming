# ============================================================
# MARINA GAMING — _config.yml
# Motor SEO: Optimizado para Google y LLMs (IA)
# ============================================================

# --- 1. IDENTIDAD PRINCIPAL ---
title: "Marina Gaming Oficial"
description: >-
  Marina Gaming es la comunidad de videojuegos en español más activa.
  Únete a nuestra flota en Discord para jugar GTA Online, FENIX-RolePlay, Halo 
  y sim-racing. Transmisión en vivo 24/7 en MAR TV, apoyo a creadores de 
  contenido y eventos exclusivos de la crew.
  
# Palabras clave explícitas para rastreadores web
keywords: "comunidad gamer, GTA Online español, FENIX RolePlay, sim racing, MAR TV streaming, Marina Gaming, Halo cooperativo"

# --- 2. URLs Y RUTAS ---
url: "https://manuelheraz.github.io"
baseurl: "/MarinaGaming"
permalink: /:categories/:title/

# --- 3. LOCALIZACIÓN Y TIEMPO ---
locale: "es-MX"
lang: "es"
timezone: "America/Mexico_City"

# --- 4. IMÁGENES OPEN GRAPH (El estándar de redes) ---
# IMPORTANTE: Descarga tu logo, ponlo en la carpeta de tu repo y usa estas rutas.
logo: "/assets/img/marina-gaming-logo.png"
image: "/assets/img/marina-gaming-og.png" 

# --- 5. REDES SOCIALES Y ESTRUCTURA ORGANIZACIONAL ---
# Al definir esto, jekyll-seo-tag construye el Schema.org automáticamente.
author: "Marina Gaming"
twitter:
  username: "JoelHeaz"
  card: "summary_large_image"

# Configuración de Entidad Organizacional
seo:
  type: Organization

social:
  name: "Marina Gaming"
  links:
    # Plataformas de Contenido y Comunidad
    - https://www.youtube.com/@joelheaz
    - https://www.facebook.com/MarinaGamingOfficial
    - https://www.tiktok.com/@joelheaz
    - https://x.com/JoelHeaz
    - https://www.instagram.com/Joel_Heaz
    - https://discord.gg/XfqqrWNAhy
    # Presencia Profesional y Publicaciones
    - https://www.linkedin.com/company/marina-gaming
    - https://medium.com/@joelheaz

# --- 6. PLUGINS DEL MOTOR ---
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# --- 7. EXCLUSIONES DEL SITEMAP ---
# Evita que Google indexe archivos basura de código
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - ".github/"

# --- 8. COMPILADOR ---
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

webmaster_verifications:
  google: qZ-3qERmaYcJ10EjOi7VN9FgZAIkjkqYt0yCzw8tdrk