<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tus hojas de estilo originales -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/MarinaGaming/assets/navbar/css/style.css">
    <link rel="stylesheet" href="/MarinaGaming/assets/footer/css/style.css">
    <title>Noticias - MARINA GAMING</title>

    <!-- ESTILOS TÁCTICOS PARA LAS NOTICIAS -->
    <style>
        /* Contenedor principal de la sección */
        .news-section {
            padding: 40px 5%;
            min-height: 70vh;
            color: #fff;
        }

        .news-header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .news-header h1 {
            font-size: 2.5rem;
            color: #0099FF; /* Azul táctico */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Cuadrícula de Tarjetas */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Diseño de cada Tarjeta */
        .news-card {
            background-color: #1e1e24;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #333;
        }

        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 153, 255, 0.2);
        }

        .news-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 3px solid #0099FF;
        }

        .card-content {
            padding: 20px;
        }

        .card-content h3 {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            color: #fff;
        }

        .card-meta {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .card-content p {
            font-size: 0.95rem;
            color: #ccc;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .read-more {
            background-color: #0099FF;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .news-card:hover .read-more {
            background-color: #007acc;
        }

        /* DISEÑO DE LA VENTANA EMERGENTE (MODAL) */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 9999; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.8); 
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #1a1a1a;
            color: white;
            margin: auto;
            border-radius: 10px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 5px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .close-button {
            color: #fff;
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            text-align: center;
            line-height: 35px;
        }

        .close-button:hover { color: #0099FF; }

        .modal-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-bottom: 4px solid #0099FF;
        }

        .modal-body-container {
            padding: 30px;
        }

        .modal-title {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 10px;
            color: #0099FF;
        }

        .modal-meta-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
            color: #aaa;
            font-size: 0.9rem;
        }

        .modal-meta-info span i { margin-right: 5px; color: #0099FF; }

        .modal-text {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #e0e0e0;
        }

        .modal-text strong { color: #fff; }

        /* ==========================================
           NUEVO: RESPONSIVE DESIGN PARA MÓVILES
           ========================================== */
        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: 1fr; /* Fuerza un solo pilar vertical */
                gap: 15px; /* Reduce el espacio entre tarjetas */
            }

            .news-section {
                padding: 20px 3%; /* Ajusta el margen lateral para aprovechar la pantalla */
            }

            .news-header h1 {
                font-size: 2rem; /* Achica un poco el título principal */
            }

            .modal-content {
                width: 95%; /* La ventana emergente ocupa casi toda la pantalla */
            }

            .modal-body-container {
                padding: 20px; /* Menos espacio interior para que quepa más texto */
            }

            .modal-img {
                height: 200px; /* Hace la imagen de cabecera más corta en celular */
            }

            .close-button {
                top: 10px;
                right: 15px;
                width: 35px;
                height: 35px;
                line-height: 30px;
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    
    <nav id="navbar"></nav>

    <!-- CONTENEDOR PRINCIPAL DE NOTICIAS -->
    <div class="main-content news-section">
        <div class="news-header">
            <h1>Marina Gaming Noticias</h1>
            <p>Las noticias más relevantes del mundo del Gaming para ti, gracias a MARbot</p>
        </div>

        <div id="news-grid" class="news-grid">
            <!-- El código JavaScript inyectará las tarjetas aquí automáticamente -->
        </div>
    </div>

    <!-- LA VENTANA EMERGENTE (MODAL) PARA LEER LA NOTA COMPLETA -->
    <div id="news-modal" class="modal">
        <div class="modal-content">
            <span class="close-button" id="close-modal">&times;</span>
            <img id="modal-img" class="modal-img" src="" alt="Portada Noticia">
            <div class="modal-body-container">
                <h2 id="modal-title" class="modal-title">Cargando título...</h2>
                <div class="modal-meta-info">
                    <span><i class="fa-solid fa-robot"></i> Autor: MARbot</span>
                    <span id="modal-date"><i class="fa-regular fa-clock"></i> Fecha</span>
                </div>
                <div id="modal-text" class="modal-text">
                    <!-- Aquí va el texto completo de la noticia -->
                </div>
            </div>
        </div>
    </div>

    <footer id="footer"></footer>

    <script src="https://kit.fontawesome.com/8f703f9e9a.js" crossorigin="anonymous"></script>
    <script src="/MarinaGaming/assets/navbar/js/navbar.js"></script>
    <script src="/MarinaGaming/assets/navbar/js/main.js"></script>
    <script src="/MarinaGaming/assets/footer/js/footer.js"></script>

    <!-- SCRIPT TÁCTICO: CONEXIÓN CON LA API DE MONGODB -->
    <script>
        // Arsenal de imágenes de Marina Gaming
        const bancoDeImagenes = [
            "https://lh3.google.com/u/2/d/1QMGwIn-vF36BJ0KpBtZYraPO3XVdGL0E=w1878-h928-iv1",
            "https://lh3.google.com/u/2/d/1vUZp9op50brqInvEWvLzZjYItE6U2JnN=w1878-h928-iv1",
            "https://lh3.google.com/u/2/d/1S0QghSmJ6BAcnh-qrm6gMZQz_qynE5Nb=w1878-h928-iv1",
            "https://lh3.google.com/u/2/d/1pHYmfsUzCvlM0NTFGbBGWEE9XYbNnhs7=w1878-h928-iv1",
            "https://lh3.google.com/u/2/d/1WZMWNKjEep5ygYyNlJWKhau2XFw-fyXN=w1878-h928-iv1",
            "https://lh3.google.com/u/2/d/1ljoaWXbwVw9GcUYatL431TNBRsTIChlI=w1878-h928-iv1",
            "https://lacasadellafibra.com/cdn/shop/files/gaming-mural-wallpaper-playstation-controller-with-vibrant-colors-45XYZ789-6.jpg",
            "https://static.vecteezy.com/system/resources/thumbnails/070/716/094/small/modern-gaming-room-featuring-led-lighting-dual-monitors-and-vibrant-design-photo.jpg",
            "https://wallpapercg.com/media/ts_2x/851.webp",
            "https://img.magnific.com/free-photo/ai-powered-device-concept_23-2151924130.jpg",
            "https://images2.alphacoders.com/107/thumb-1920-107892.jpg",
            "https://i.etsystatic.com/50555474/r/il/126249/5784055010/il_570xN.5784055010_dg5f.jpg",
            "https://img.magnific.com/free-vector/eye-catching-electronic-remote-controller-background-with-text-space_1017-54739.jpg",
            "https://lh3.google.com/u/2/d/1ISIqcBVeLIKXylN3_oM-3eYJFWoQTTRx=w1878-h928-iv1"
        ];

        // Elementos del Modal
        const modal = document.getElementById('news-modal');
        const closeModal = document.getElementById('close-modal');

        // Función principal para extraer la inteligencia de la base de datos
        async function cargarNoticias() {
            const grid = document.getElementById('news-grid');
            try {
                // Hacemos el ping a tu API en Render
                const response = await fetch('https://marbot-w8qd.onrender.com/api/noticias');
                const noticias = await response.json();

                if(noticias.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; grid-column: 1 / -1;">Los escáneres están vacíos. Aún no hay noticias almacenadas.</p>';
                    return;
                }

                // Procesamos cada noticia que llegó del servidor
                noticias.forEach(nota => {
                    let textoOriginal = nota.texto;
                    let tituloNoticia = "Reporte de Marina Gaming";

                    // 1. Extraemos el título (Gemini siempre lo pone entre ** al principio)
                    const matchTitulo = textoOriginal.match(/\*\*(.*?)\*\*/);
                    if (matchTitulo) {
                        tituloNoticia = matchTitulo[1]; // Guardamos el título limpio
                        // Borramos esa primera línea del cuerpo del texto para no repetirla
                        textoOriginal = textoOriginal.replace(/\*\*.*?\*\*/, '').trim(); 
                    }

                    // 2. Formateamos el resto del texto (convertir ** a negritas y \n a saltos de línea HTML)
                    let cuerpoFormateado = textoOriginal.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                    cuerpoFormateado = cuerpoFormateado.replace(/\n/g, '<br>');

                    // 3. Generamos la fecha exacta y hora de la Ciudad de México
                    const fechaObj = new Date(nota.fecha);
                    const opcionesFecha = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZone: 'America/Mexico_City' };
                    const fechaLegible = fechaObj.toLocaleDateString('es-MX', opcionesFecha);

                    // 4. Elegimos una imagen de portada al azar
                    const imagenAleatoria = bancoDeImagenes[Math.floor(Math.random() * bancoDeImagenes.length)];

                    // 5. Creamos un resumen corto para la tarjeta (solo los primeros 130 caracteres)
                    const resumenCorto = textoOriginal.replace(/<br>/g, ' ').substring(0, 130) + "...";

                    // 6. Construimos la tarjeta visual HTML
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.innerHTML = `
                        <img src="${imagenAleatoria}" alt="Imagen Noticia">
                        <div class="card-content">
                            <h3>${tituloNoticia}</h3>
                            <div class="card-meta">
                                <span><i class="fa-solid fa-robot"></i> MARbot</span>
                                <span>${fechaLegible}</span>
                            </div>
                            <p>${resumenCorto}</p>
                            <button class="read-more">Leer nota completa</button>
                        </div>
                    `;

                    // 7. Le decimos a la tarjeta que abra el Modal al hacerle clic
                    card.addEventListener('click', () => {
                        abrirNoticia(tituloNoticia, cuerpoFormateado, imagenAleatoria, fechaLegible);
                    });

                    // Añadimos la tarjeta al grid de la página
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error('Interferencia de señal:', error);
                grid.innerHTML = '<p style="color:red; text-align:center; grid-column: 1 / -1;">Error de enlace: No se pudo contactar con los servidores de MARbot.</p>';
            }
        }

        // Función para inyectar los datos en el Modal y mostrarlo en pantalla
        function abrirNoticia(titulo, cuerpo, imagen, fecha) {
            document.getElementById('modal-img').src = imagen;
            document.getElementById('modal-title').innerText = titulo;
            document.getElementById('modal-date').innerHTML = `<i class="fa-regular fa-clock"></i> ${fecha}`;
            document.getElementById('modal-text').innerHTML = cuerpo;
            modal.style.display = 'flex';
        }

        // Controles para cerrar el Modal
        closeModal.onclick = function() {
            modal.style.display = "none";
        }
        
        // Si el usuario hace clic afuera de la caja negra, también se cierra
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // Disparamos la carga de datos en cuanto la página abre
        cargarNoticias();
    </script>
</body>
</html>
